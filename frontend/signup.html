<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account | Skill Coach</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<nav class="navbar">
  <div class="logo">Skill Coach</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/login">Login</a>
  </div>
</nav>

<section class="signup-wrapper">

  <!-- LEFT SIDE -->
  <div class="signup-info">
    <h1>Join Skill Coach</h1>
    <p class="subtitle">
      Start tracking your developer growth with AI-powered analysis.
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="signup-form-container">
    <h2>Create Your Account</h2>

    <form id="signupForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password (min 8 characters)" required>
      <input type="password" id="confirm_password" placeholder="Confirm Password" required>
      <button type="submit">Create Account</button>
      <p id="message"></p>
    </form>

    <p class="login-redirect">
      Already have an account?
      <a href="/login">Login</a>
    </p>
  </div>

</section>

<script src="/static/app.js?v=99"></script>

</body>
</html>
